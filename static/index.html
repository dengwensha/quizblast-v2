<!DOCTYPE html>
<html>
<head>
    <title>Quiz Player</title>
</head>
<body>
    <h1>Welcome to QuizBlast</h1>
    <button onclick="join()">Join Game</button>

    <script>
        function join() {
            alert("Joined!");
        }
    </script>
</body>
</html>

<script>
let ws = new WebSocket("wss://" + location.host + "/ws");

ws.onmessage = (event) => {
    alert("New message: " + event.data);
};

function join() {
    ws.send("Player joined");
}
</script>
