<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast Oyuncu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 750px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .join-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1f6feb;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .question-box {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #e9eef3;
    }

    .option-btn:hover {
      background: #d9e3ec;
    }

    .status, .leaderboard {
      margin-top: 24px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 10px;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QuizBlast Oyuncu Ekranı</h1>

    <input id="playerName" placeholder="Adını yaz..." />
    <button class="join-btn" onclick="joinGame()">Oyuna Katıl</button>

    <div class="question-box" id="questionText">Soru bekleniyor...</div>

    <div class="options">
      <button class="option-btn" onclick="sendAnswer('A')" id="btnA">A</button>
      <button class="option-btn" onclick="sendAnswer('B')" id="btnB">B</button>
      <button class="option-btn" onclick="sendAnswer('C')" id="btnC">C</button>
      <button class="option-btn" onclick="sendAnswer('D')" id="btnD">D</button>
    </div>

    <div class="status" id="statusBox">Bağlanıyor...</div>

    <div class="leaderboard">
      <h3>Skor Tablosu</h3>
      <ul id="leaderboardList"></ul>
    </div>
  </div>

  <script>
    let wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    let ws = new WebSocket(wsProtocol + "://" + location.host + "/ws");
    let myName = "";

    ws.onopen = () => {
      document.getElementById("statusBox").innerText = "Sunucuya bağlandı.";
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "question") {
        const q = msg.data;
        document.getElementById("questionText").innerText = q.question;
        document.getElementById("btnA").innerText = "A) " + q.options[0];
        document.getElementById("btnB").innerText = "B) " + q.options[1];
        document.getElementById("btnC").innerText = "C) " + q.options[2];
        document.getElementById("btnD").innerText = "D) " + q.options[3];
        document.getElementById("statusBox").innerText = "Yeni soru geldi. Cevabını seç.";
      }

      if (msg.type === "answer_result") {
        document.getElementById("statusBox").innerText =
          (msg.correct ? "Doğru cevap! " : "Yanlış cevap. ") +
          "Doğru cevap: " + msg.correct_answer +
          " | Puanın: " + msg.score;
      }

      if (msg.type === "show_answer") {
        document.getElementById("statusBox").innerText =
          "Doğru cevap açıklandı: " + msg.correct_answer;
      }

      if (msg.type === "leaderboard") {
        renderLeaderboard(msg.players);
      }

      if (msg.type === "info") {
        document.getElementById("statusBox").innerText = msg.message;
      }
    };

    ws.onclose = () => {
      document.getElementById("statusBox").innerText = "Bağlantı koptu.";
    };

    function joinGame() {
      myName = document.getElementById("playerName").value.trim();
      if (!myName) {
        alert("Lütfen adını gir.");
        return;
      }

      ws.send(JSON.stringify({
        type: "join",
        name: myName
      }));

      document.getElementById("statusBox").innerText = "Oyuna katıldın: " + myName;
    }

    function sendAnswer(answer) {
      if (!myName) {
        alert("Önce oyuna katıl.");
        return;
      }

      ws.send(JSON.stringify({
        type: "answer",
        name: myName,
        answer: answer
      }));

      document.getElementById("statusBox").innerText = "Cevabın gönderildi: " + answer;
    }

    function renderLeaderboard(players) {
      const ul = document.getElementById("leaderboardList");
      ul.innerHTML = "";

      const entries = Object.entries(players).sort((a, b) => b[1] - a[1]);

      entries.forEach(([name, score]) => {
        const li = document.createElement("li");
        li.innerText = name + " - " + score + " puan";
        ul.appendChild(li);
      });
    }
  </script>
</body>
</html>
