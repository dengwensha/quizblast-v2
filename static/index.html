<!DOCTYPE html>
<html>
<head>
    <title>Quiz Player</title>
</head>
<body>

<h1>QuizBlast</h1>

<div id="messages"></div>

<button onclick="join()">Join</button>

<script>
let ws = new WebSocket("wss://" + location.host + "/ws");

ws.onmessage = (event) => {
    let div = document.getElementById("messages");
    let p = document.createElement("p");
    p.innerText = event.data;
    div.appendChild(p);
};

function join() {
    ws.send("Player joined");
}
</script>

</body>
</html>
