<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast Host</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      margin-bottom: 12px;
    }

    button:hover {
      background: #1859bb;
    }

    .status, .question-box, .leaderboard {
      margin-top: 20px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 10px;
    }

    ul {
      padding-left: 20px;
    }

    .correct-btn {
      background: #16a34a;
    }

    .correct-btn:hover {
      background: #12803a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QuizBlast Host Panel</h1>

    <button onclick="nextQuestion()">Sonraki Soru</button>
    <button onclick="showAnswer()" class="correct-btn">Doğru Cevabı Göster</button>
    <button onclick="restartQuiz()">Quizi Baştan Başlat</button>

    <div class="question-box">
      <h3>Aktif Soru</h3>
      <div id="questionText">Yükleniyor...</div>
      <ul id="optionsList"></ul>
    </div>

    <div class="leaderboard">
      <h3>Skor Tablosu</h3>
      <ul id="leaderboardList"></ul>
    </div>

    <div class="status" id="statusBox">Bağlanıyor...</div>
  </div>

  <script>
    let wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    let ws = new WebSocket(wsProtocol + "://" + location.host + "/ws");

    ws.onopen = () => {
      document.getElementById("statusBox").innerText = "Host panel bağlandı.";
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "question") {
        showQuestion(msg.data);
      }

      if (msg.type === "leaderboard") {
        renderLeaderboard(msg.players);
      }

      if (msg.type === "host_answer_info") {
        document.getElementById("statusBox").innerText =
          msg.player + " cevabı verdi: " + msg.answer +
          (msg.correct ? " (Doğru)" : " (Yanlış)");
      }

      if (msg.type === "show_answer") {
        document.getElementById("statusBox").innerText =
          "Doğru cevap: " + msg.correct_answer;
      }
    };

    function showQuestion(q) {
      document.getElementById("questionText").innerText = q.question;
      const ul = document.getElementById("optionsList");
      ul.innerHTML = "";

      q.options.forEach((opt, i) => {
        const li = document.createElement("li");
        li.innerText = String.fromCharCode(65 + i) + ") " + opt;
        ul.appendChild(li);
      });
    }

    function renderLeaderboard(players) {
      const ul = document.getElementById("leaderboardList");
      ul.innerHTML = "";

      const entries = Object.entries(players).sort((a, b) => b[1] - a[1]);

      entries.forEach(([name, score]) => {
        const li = document.createElement("li");
        li.innerText = name + " - " + score + " puan";
        ul.appendChild(li);
      });
    }

    function nextQuestion() {
      ws.send(JSON.stringify({ type: "next_question" }));
      document.getElementById("statusBox").innerText = "Sonraki soru gönderildi.";
    }

    function restartQuiz() {
      ws.send(JSON.stringify({ type: "restart_quiz" }));
      document.getElementById("statusBox").innerText = "Quiz başa alındı.";
    }

    function showAnswer() {
      ws.send(JSON.stringify({ type: "show_answer" }));
      document.getElementById("statusBox").innerText = "Doğru cevap açıklandı.";
    }
  </script>
</body>
</html>
