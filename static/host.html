<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizBlast Oyuncu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 760px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .join-btn {
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 10px;
    }
    .question-box {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .option-btn {
      border: none;
      border-radius: 10px;
      background: #e9eef3;
      padding: 16px;
      font-size: 18px;
      cursor: pointer;
    }
    .status, .leaderboard, .timer {
      margin-top: 20px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 10px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QuizBlast Oyuncu</h1>

    <input id="playerName" placeholder="Adın" />
    <input id="roomCode" placeholder="Oda Kodu" />
    <button class="join-btn" onclick="joinGame()">Oyuna Katıl</button>

    <div class="timer" id="timerBox">Süre: -</div>
    <div class="question-box" id="questionText">Soru bekleniyor...</div>

    <div class="options">
      <button class="option-btn" onclick="sendAnswer('A')" id="btnA">A</button>
      <button class="option-btn" onclick="sendAnswer('B')" id="btnB">B</button>
      <button class="option-btn" onclick="sendAnswer('C')" id="btnC">C</button>
      <button class="option-btn" onclick="sendAnswer('D')" id="btnD">D</button>
    </div>

    <div class="status" id="statusBox">Bağlanıyor...</div>

    <div class="leaderboard">
      <h3>Skor Tablosu</h3>
      <ul id="leaderboardList"></ul>
    </div>
  </div>

  <script>
    let wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    let ws = new WebSocket(wsProtocol + "://" + location.host + "/ws");
    let myName = "";
    let countdownInterval = null;

    ws.onopen = () => {
      document.getElementById("statusBox").innerText = "Sunucuya bağlandı.";
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === "join_success") {
        document.getElementById("statusBox").innerText =
          "Oyuna katıldın: " + msg.name + " | Oda: " + msg.room_code;
      }

      if (msg.type === "question") {
        const q = msg.data;
        document.getElementById("questionText").innerText = q.question;
        document.getElementById("btnA").innerText = "A) " + q.options[0];
        document.getElementById("btnB").innerText = "B) " + q.options[1];
        document.getElementById("btnC").innerText = "C) " + q.options[2];
        document.getElementById("btnD").innerText = "D) " + q.options[3];
        document.getElementById("statusBox").innerText = "Yeni soru geldi.";
        startTimer(msg.duration);
      }

      if (msg.type === "answer_result") {
        document.getElementById("statusBox").innerText =
          (msg.correct ? "Doğru! " : "Yanlış! ") +
          "Doğru cevap: " + msg.correct_answer +
          " | Puanın: " + msg.score;
      }

      if (msg.type === "question_closed") {
        document.getElementById("statusBox").innerText =
          "Süre bitti. Doğru cevap: " + msg.correct_answer;
        stopTimer();
      }

      if (msg.type === "leaderboard") {
        renderLeaderboard(msg.players);
      }

      if (msg.type === "info") {
        document.getElementById("statusBox").innerText = msg.message;
      }

      if (msg.type === "quiz_finished") {
        document.getElementById("statusBox").innerText = "Quiz bitti.";
        stopTimer();
      }
    };

    function joinGame() {
      myName = document.getElementById("playerName").value.trim();
      const roomCode = document.getElementById("roomCode").value.trim();

      if (!myName || !roomCode) {
        alert("İsim ve oda kodu gir.");
        return;
      }

      ws.send(JSON.stringify({
        type: "join",
        name: myName,
        room_code: roomCode
      }));
    }

    function sendAnswer(answer) {
      if (!myName) {
        alert("Önce oyuna katıl.");
        return;
      }

      ws.send(JSON.stringify({
        type: "answer",
        name: myName,
        answer: answer
      }));
    }

    function renderLeaderboard(players) {
      const ul = document.getElementById("leaderboardList");
      ul.innerHTML = "";
      const entries = Object.entries(players).sort((a, b) => b[1] - a[1]);

      entries.forEach(([name, score]) => {
        const li = document.createElement("li");
        li.innerText = name + " - " + score + " puan";
        ul.appendChild(li);
      });
    }

    function startTimer(seconds) {
      stopTimer();
      let remaining = seconds;
      document.getElementById("timerBox").innerText = "Süre: " + remaining + " sn";

      countdownInterval = setInterval(() => {
        remaining--;
        document.getElementById("timerBox").innerText = "Süre: " + remaining + " sn";
        if (remaining <= 0) {
          stopTimer();
        }
      }, 1000);
    }

    function stopTimer() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
    }
  </script>
</body>
</html>
