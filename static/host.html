<!DOCTYPE html>
<html>
<head>
    <title>Quiz Host</title>
</head>
<body>
    <h1>Quiz Host Panel</h1>
    <button onclick="startQuiz()">Start Quiz</button>

    <script>
        function startQuiz() {
            alert("Quiz started!");
        }
    </script>
</body>
</html>
<script>
let ws = new WebSocket("wss://" + location.host + "/ws");

function startQuiz() {
    ws.send("Quiz started!");
}
</script>
