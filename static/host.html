<!DOCTYPE html>
<html>
<head>
    <title>Host Panel</title>
</head>
<body>

<h1>Host Panel</h1>

<input id="question" placeholder="Soru yaz..." />
<button onclick="send()">Gönder</button>

<script>
let ws = new WebSocket("wss://" + location.host + "/ws");

function send() {
    let q = document.getElementById("question").value;
    ws.send(q);
}
</script>

</body>
</html>
