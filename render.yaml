services:
  - type: web
    name: quizblast-v2
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 720
      - key: DATABASE_URL
        fromDatabase:
          name: quizblast-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quizblast-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: HOST_ADMIN_EMAIL
        sync: false
      - key: HOST_ADMIN_PASSWORD
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: PYTHONPATH
        value: .
  - type: redis
    name: quizblast-redis
    ipAllowList: []
    plan: free

databases:
  - name: quizblast-db
    plan: free
